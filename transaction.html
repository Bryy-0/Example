<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - Digital Alkansiya</title>
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="transaction.css">
</head>

<body class="dashboard-body">

    <div class="transaction-container">
        <div class="back-nav">
            <a href="home.html" class="btn-back">
                <span class="arrow">←</span> Back to Dashboard
            </a>
        </div>

        <h1>Transaction History</h1>
        <p class="text-muted">Viewing recent donations for <strong id="user-name-display">User</strong></p>

        <table class="transaction-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Reference ID</th>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="transaction-list">
                <tr>
                    <td colspan="5" style="text-align:center; padding: 40px;">Loading transactions...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="transaction.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Digital Alkansiya</title>
    <link rel="stylesheet" href="profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="profile-layout-body">

    <div class="main-container">
        <div class="profile-sidebar">
            <div class="sidebar-card">
                <div class="profile-pic-container">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
                </div>
                <h3 id="profile-user-name">Loading...</h3>
                <p class="text-muted">Account ID: <span id="profile-acc-id">#0000</span></p>

                <nav class="sidebar-nav">
                    <a href="home.html">Home</a>
                    <a href="profile.html" class="active">Account Settings</a>
                    <a href="#">Transaction History</a>
                    <a href="form.html" class="logout-link" onclick="sessionStorage.clear()">Logout</a>
                </nav>
            </div>
        </div>

        <div class="profile-content">
            <div class="info-card">
                <h2>User Information</h2>
                <hr>
                <div class="info-row">
                    <span class="label">Name:</span>
                    <span class="value" id="display-full-name">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="label">Email:</span>
                    <span class="value" id="display-email">Loading...</span>
                </div>
                <div class="info-row">
                    <span class="label">Phone:</span>
                    <span class="value" id="display-phone">Loading...</span>
                </div>
            </div>

            <div class="info-card">
                <h2>Savings Progress</h2>
                <p class="text-muted">Target Goal: <strong>8,000</strong> Pesos</p>

                <div class="jar-display-section">
                    <div class="jar-stats-text">
                        <p>You have saved ₱<strong id="display-total-saved">0</strong> out of <strong>8,000</strong> pesos!</p>

                        <a href="home.html" style="text-decoration: none;">
                            <button class="update-btn">Update Savings</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="profile.js"></script>
</body>
</html>

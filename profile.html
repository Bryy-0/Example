<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Digital Alkansiya</title>
    <link rel="stylesheet" href="profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="profile-layout-body">

    <div class="main-container">
        <div class="profile-sidebar">
            <div class="sidebar-card">
                <div class="profile-pic-container">
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
                </div>
                <h3>User Name</h3>
                <p class="text-muted">Account ID: #0001</p>

                <nav class="sidebar-nav">
                    <a href="home.html">Home</a>
                    <a href="profile.html" class="active">Account Settings</a>
                    <a href="#">Transaction History</a>
                    <a href="form.html" class="logout-link">Logout</a>
                </nav>
            </div>
        </div>

        <div class="profile-content">
            <div class="info-card">
                <h2>User Information</h2>
                <hr>
                <div class="info-row">
                    <span class="label">Name:</span>
                    <span class="value">John Doe</span>
                </div>
                <div class="info-row">
                    <span class="label">Email:</span>
                    <span class="value">example@mail.com</span>
                </div>
                <div class="info-row">
                    <span class="label">Phone:</span>
                    <span class="value">123-456-7890</span>
                </div>
            </div>

            <div class="info-card">
                <h2>Savings Progress</h2>
                <p class="text-muted">Target Goal: <strong>1,000</strong> Pesos</p>

                <div class="jar-display-section">
                    <div class="jar-stats-text">
                        <p>You have saved <strong>0</strong> out of <strong>1,000</strong> pesos!</p>

                        <a href="profile.html" style="text-decoration: none;">
                            <button class="update-btn">Update Savings</button>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

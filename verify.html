<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity - Digital Alkansiya</title>
    <link rel="stylesheet" href="verify.css">
</head>
<body class="dashboard-body">

    <div class="verify-container">
        <h1 class="verify-header">Verification</h1>
        
        <p class="verify-description">To secure your account, please verify your email.</p>
        
        <div id="step-1">
            <input type="email" id="verify-email" class="verify-input" placeholder="Email Address" required>
            <button type="button" class="verify-btn" onclick="sendCode()">Send Code</button>
        </div>

        <div id="step-2" style="display: none;">
            <input type="text" id="digit-code" class="verify-input" maxlength="6" placeholder="000000" style="text-align: center; letter-spacing: 5px;">
            <button type="button" class="verify-btn" onclick="verifyUser()">Verify Now</button>
            <p id="error-msg" style="color: #fff; background: #c0392b; display: none; padding: 10px; border-radius: 4px; margin-top: 10px;">Incorrect code. Try again.</p>
        </div>

        <p style="margin-top: 20px;">
            <a href="home.html" class="login-link">Back to Dashboard</a>
        </p>
    </div>

    <script src="verify.js"></script>
</body>
</html>

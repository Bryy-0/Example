<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Digital Alkansiya</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="top-creator.css">
</head>

<body class="dashboard-body">

    <div class="menu-container">
        <div class="hamburger" id="hamburger-icon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <nav class="side-menu" id="side-menu">
        <div class="menu-header">
            <p class="brand-subtext">Menu</p>
        </div>
        <ul class="menu-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="profile.html">Profile</a></li>
            <li><a href="#">Settings</a></li>
            <li><a href="top-creator.html" class="active">Top Creators</a></li>
            <hr>
            <li><a href="verify.html" class="verify-btn">Verify Now</a></li>
        </ul>
        <div class="social-section">
            <a href="https://www.facebook.com/createfoundationph" target="_blank" class="follow-btn">FOLLOW US</a>
        </div>
        <div class="menu-footer">
            <button type="button" class="logout-btn" onclick="sessionStorage.clear(); window.location.href='index.html'">Logout</button>
        </div>
    </nav>

    <div class="leaderboard-wrapper">
        <h1 class="leaderboard-header">TOP CREATORS</h1>

        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th class="header-main coral" id="total-collection">Total Community Collection: <br>₱0.00</th>
                    <th class="header-main coral" id="user-count">No. of Users: <br>0</th>
                </tr>
                <tr>
                    <th class="header-sub">Ranking</th>
                    <th class="header-sub">Name</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
            <tfoot>
                <tr class="footer-row">
                    <td id="user-rank">YOUR RANKING: --</td>
                    <td id="current-user-name">CREATOR [NAME]</td>
                </tr>
            </tfoot>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="top-creator.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const icon = document.getElementById('hamburger-icon');
            menu.classList.toggle('active');
            icon.classList.toggle('open');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Alkansiya - Registration Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
</head>

<body>

    <div class="container">
        <div class="form-box active" id="login-form">
            <h2>Login</h2>
            <form id="login-inner-form">
                <div id="login-error" style="color: #ff4d4d; font-size: 0.85rem; text-align: center; margin-bottom: 10px; display: none;"></div>
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" minlength="8" required>

                <button type="submit" name="login">Login</button>
                <p style="text-align: center; margin-top: 15px; font-size: 0.8rem;">
                    Don't have an account? <a href="#" onclick="showForm('register-form')">Register</a>
                </p>
            </form>
        </div>

        <div class="form-box" id="register-form">
            <h2>Create Account</h2>
            <form id="register-inner-form">
                <div id="register-error" style="color: #ff4d4d; font-size: 0.85rem; text-align: center; margin-bottom: 10px; display: none;"></div>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>

                <label for="email-reg">Email Address</label>
                <input type="email" id="email-reg" name="email" placeholder="example@mail.com" required>

                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="09683535892" required>

                <label for="password-reg">Password</label>
                <input type="password" id="password-reg" name="password" minlength="8" required>

                <button type="submit" name="register">Register</button>

                <p style="text-align: center; margin-top: 15px; font-size: 0.8rem;">
                    Already have an account? <a href="#" onclick="showForm('login-form')">Login</a>
                </p>
            </form>
        </div>
    </div>

    <script src="form.js"></script>

</body>
</html>
